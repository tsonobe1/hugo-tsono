<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}" data-theme="dark">

<head>
  {{ partial "head.html" . }}
</head>

<body>
  <header role="banner">
    <div class="container">
      <div>
        <h1><a href="/">{{ site.Title }}</a></h1>
        {{ with site.Params.description }}
        <p class="site-description">{{ . }}</p>
        {{ end }}
      </div>
      <div class="header-controls">
        {{ partial "language-toggle.html" . }}
        <button id="theme-toggle">🌙 ダークモード</button>
      </div>
    </div>
  </header>

  <main role="main">
    <div class="container">
      {{ block "main" . }}{{ end }}
    </div>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p>&copy; {{ now.Format "2006" }} {{ site.Params.author.name | default site.Title }}</p>
    </div>
  </footer>

  <script defer src="/js/theme-toggle.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const reactionBtns = document.querySelectorAll('.reaction-btn');
      reactionBtns.forEach(btn => {
        const type = btn.getAttribute('data-reaction');
        const key = `reaction_${type}_${window.location.pathname}`;
        const isActive = localStorage.getItem(key) === 'true';
        
        if (isActive) {
          btn.classList.add('active');
        }
      });
    });
  </script>
</body>

</html>
