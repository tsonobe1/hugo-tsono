<div class="reactions-section">
  <h4>この記事はいかがでしたか？</h4>
  <div class="reactions">
    <button class="reaction-btn like-btn" onclick="toggleReaction('like', '{{ .File.UniqueID }}')" aria-label="いいね">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span class="reaction-count" id="like-count-{{ .File.UniqueID }}">0</span>
    </button>
    
    <button class="reaction-btn helpful-btn" onclick="toggleReaction('helpful', '{{ .File.UniqueID }}')" aria-label="参考になった">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>
      </svg>
      <span class="reaction-count" id="helpful-count-{{ .File.UniqueID }}">0</span>
    </button>
  </div>
</div>
